<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Playground</title>

    <link rel="stylesheet" href="./styles.css">
    <script src="script.js"></script>

</head>
<body>

<div class="container">

    <aside class="sidebar">

        <h2>📄 Documents</h2>

        <textarea
            id="docInput"
            placeholder="Paste your document here..."
        ></textarea>

        <button id="addDocBtn">
            Add Document
        </button>

        <h3>Indexed Chunks</h3>

        <div id="chunks" class="chunk-list"></div>

    </aside>

    <main class="chat-container">

        <header>
            <h2>💬 RAG Chat</h2>
        </header>

        <div id="chat" class="chat-window"></div>

        <div class="chat-input">

            <input
                id="question"
                type="text"
                placeholder="Ask anything..."
            >

            <button id="askBtn">
                Ask
            </button>

        </div>

    </main>

</div>


</body>
</html>
